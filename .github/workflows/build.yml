name: Build VisionClaw IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout VisionClaw
        uses: actions/checkout@v4
        with:
          repository: matrixcoding222/VisionClaw
          ref: main

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Inject Secrets
        run: |
          cat > samples/CameraAccess/CameraAccess/Secrets.swift << 'SWIFT'
          import Foundation

          enum Secrets {
            static let geminiAPIKey = "${{ secrets.GEMINI_API_KEY }}"
            // Tailscale-served HTTPS endpoint (reachable from iOS over the tailnet,
            // avoids ATS issues with plain HTTP on the public IP).
            static let openClawHost = "https://jarvis-prime.tail89fc92.ts.net"
            static let openClawPort = 443
            static let openClawHookToken = ""
            static let openClawGatewayToken = "${{ secrets.OPENCLAW_GATEWAY_TOKEN }}"
            static let webrtcSignalingURL = ""
          }
          SWIFT

      - name: Patch AudioManager for SDK compatibility
        run: |
          sed -i '' 's/.allowBluetoothHFP/.allowBluetooth/g' \
            samples/CameraAccess/CameraAccess/Gemini/AudioManager.swift

      - name: Bake Meta wearables credentials into Info.plist
        env:
          META_APP_ID: ${{ secrets.META_APP_ID }}
          CLIENT_TOKEN: ${{ secrets.CLIENT_TOKEN }}
        run: |
          PLIST=samples/CameraAccess/CameraAccess/Info.plist
          # Use PlistBuddy for safe key-based substitution (value may contain '|' '/' etc)
          /usr/libexec/PlistBuddy -c "Set :MWDAT:MetaAppID $META_APP_ID" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :MWDAT:ClientToken $CLIENT_TOKEN" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :MWDAT:TeamID " "$PLIST" || true
          echo "--- MWDAT block after substitution ---"
          /usr/libexec/PlistBuddy -c "Print :MWDAT" "$PLIST"

      - name: Resolve packages
        run: |
          cd samples/CameraAccess
          xcodebuild -resolvePackageDependencies \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess

      - name: Build archive (ad-hoc unsigned)
        run: |
          cd samples/CameraAccess
          xcodebuild archive \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/CameraAccess.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create IPA from archive
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r $RUNNER_TEMP/CameraAccess.xcarchive/Products/Applications/*.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r VisionClaw.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-IPA
          path: ${{ runner.temp }}/VisionClaw.ipa
          retention-days: 30
